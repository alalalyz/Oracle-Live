<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#04080f"/>
<title>⚽ Oracle Live</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:   #04080f;
  --bg2:  #0a1120;
  --bg3:  #101828;
  --c1:   #00d4ff;
  --c2:   #ff6b35;
  --c3:   #00ff88;
  --c4:   #ffd700;
  --c5:   #b388ff;
  --txt:  #e2ecf6;
  --t2:   rgba(226,236,246,.55);
  --t3:   rgba(226,236,246,.28);
  --t4:   rgba(226,236,246,.12);
  --bdr:  rgba(255,255,255,.07);
  --r:    10px;
  --r2:   6px;
  --r3:   4px;
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
html{ background:var(--bg); color:var(--txt); font-family:'JetBrains Mono',monospace; font-size:14px; }
body{ min-height:100vh; overflow-x:hidden; }

/* scanlines */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.008) 2px,rgba(0,212,255,.008) 4px);
}

::-webkit-scrollbar{ width:2px; height:2px; }
::-webkit-scrollbar-thumb{ background:rgba(0,212,255,.25); border-radius:2px; }

@keyframes spin    { to{ transform:rotate(360deg) } }
@keyframes pulse   { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.2;transform:scale(2)} }
@keyframes fadeUp  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }

/* ── LAYOUT ── */
.app { max-width:640px; margin:0 auto; padding:14px 12px 100px; }

/* ── HEADER ── */
.hdr { margin-bottom:14px; }
.hdr-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.brand-eye  { font-size:7px; letter-spacing:5px; color:rgba(0,212,255,.45); margin-bottom:4px; }
.brand-name { font-family:'Orbitron',monospace; font-size:clamp(22px,7vw,34px); font-weight:900; letter-spacing:2px; line-height:1;
  background:linear-gradient(135deg,var(--c1) 0%,#cce8ff 40%,var(--c2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.brand-date { font-size:8px; color:var(--t3); letter-spacing:2px; margin-top:3px; }
.hdr-right  { text-align:right; flex-shrink:0; }
.hdr-meta   { font-size:8px; color:var(--t3); margin-bottom:2px; }
.hdr-meta span { color:rgba(0,212,255,.6); }
.btn-ref    { display:block; margin-top:5px; margin-left:auto; padding:5px 11px;
  background:transparent; border:1px solid rgba(0,212,255,.2); color:rgba(0,212,255,.65);
  font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:2px; cursor:pointer; border-radius:var(--r3);
  transition:all .2s; }
.btn-ref:active { background:rgba(0,212,255,.1); }

/* ── STATS ── */
.stats { display:flex; margin-top:10px; background:var(--bg2); border:1px solid var(--bdr); border-radius:var(--r); overflow:hidden; }
.stat  { flex:1; text-align:center; padding:10px 4px; border-right:1px solid var(--bdr); }
.stat:last-child { border-right:none; }
.stat-v { font-family:'Orbitron',monospace; font-size:20px; font-weight:800; line-height:1; margin-bottom:2px; }
.stat-l { font-size:7px; color:var(--t3); letter-spacing:1px; }

/* ── TABS ── */
.tabs-wrap { background:var(--bg2); border:1px solid var(--bdr); border-radius:var(--r); padding:4px; margin-bottom:10px; }
.tabs { display:flex; gap:3px; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab  { flex:1; min-width:0; padding:7px 3px; border:1px solid transparent; background:transparent;
  color:var(--t3); cursor:pointer; font-family:'JetBrains Mono',monospace;
  font-size:8px; letter-spacing:.5px; border-radius:var(--r3); white-space:nowrap;
  text-align:center; transition:all .2s; }
.tab.on { background:rgba(0,212,255,.1); border-color:rgba(0,212,255,.22); color:var(--c1); }

/* ── LOADING ── */
.loading { display:flex; flex-direction:column; align-items:center; padding:55px 16px; animation:fadeUp .3s ease; }
.spinner { width:42px; height:42px; border:2px solid rgba(0,212,255,.1); border-top:2px solid var(--c1);
  border-radius:50%; animation:spin .7s linear infinite; margin-bottom:18px; }
.load-h { font-family:'Orbitron',monospace; font-size:13px; color:var(--c1); letter-spacing:2px; margin-bottom:6px; }
.load-p { font-size:9px; color:var(--t2); margin-bottom:18px; text-align:center; min-height:14px; }
.phases { width:100%; max-width:300px; background:var(--bg2); border:1px solid rgba(0,212,255,.12);
  border-radius:var(--r); padding:10px 12px; }
.ph { display:flex; align-items:center; gap:8px; padding:3px 0; transition:opacity .4s; }
.ph-i { width:14px; text-align:center; font-size:10px; }
.ph-t { font-size:8px; }

/* ── ERROR ── */
.errbox  { background:rgba(255,107,53,.06); border:1px solid rgba(255,107,53,.25); border-radius:var(--r); padding:14px; animation:fadeUp .3s ease; }
.err-msg { color:var(--c2); font-size:10px; line-height:1.7; margin-bottom:10px; }
.btn-retry { padding:6px 16px; background:rgba(255,107,53,.1); border:1px solid rgba(255,107,53,.28);
  color:var(--c2); font-family:'JetBrains Mono',monospace; font-size:9px; cursor:pointer; border-radius:var(--r3); }

/* ── FILTERS ── */
.filters { margin-bottom:8px; }
.frow { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:4px; }
.fb { padding:3px 9px; border:1px solid var(--bdr); background:transparent; color:var(--t3);
  cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:8px; border-radius:20px;
  white-space:nowrap; transition:all .15s; }
.fb.on { background:rgba(0,212,255,.1); border-color:rgba(0,212,255,.28); color:var(--c1); }

/* ── LIVE ── */
.dot { display:inline-flex; align-items:center; gap:4px; }
.dot-c { width:6px; height:6px; border-radius:50%; background:var(--c3); animation:pulse 1.2s infinite; }
.dot-t { font-size:8px; color:var(--c3); letter-spacing:2px; font-weight:700; }
.live-band { display:flex; align-items:center; gap:8px; padding:7px 11px;
  background:rgba(0,255,136,.04); border:1px solid rgba(0,255,136,.14); border-radius:var(--r3); margin-bottom:7px; }
.live-band-t { font-size:9px; color:rgba(0,255,136,.55); }

/* ── BADGE ── */
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:3px;
  font-size:7px; font-family:'JetBrains Mono',monospace; letter-spacing:1px; font-weight:700; white-space:nowrap; }

/* ── PROGRESS BAR ── */
.bar { display:flex; align-items:center; gap:5px; }
.bar-t { flex:1; height:3px; background:rgba(255,255,255,.06); border-radius:2px; overflow:hidden; }
.bar-f { height:100%; border-radius:2px; transition:width 1s ease; }
.bar-p { font-size:9px; min-width:28px; text-align:right; }

/* ─────────────────────────────────────────
   MATCH CARD
───────────────────────────────────────── */
.mc { background:var(--bg2); border:1px solid var(--bdr); border-radius:var(--r);
  padding:12px 13px; margin-bottom:6px; cursor:pointer; transition:border-color .2s; animation:fadeUp .3s ease; }
.mc:active { background:var(--bg3); }
.mc.sel { border-color:rgba(0,212,255,.28); background:rgba(0,212,255,.035); }

.mc-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; gap:6px; }
.mc-comp { font-size:8px; color:var(--t3); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mc-badges { display:flex; gap:4px; align-items:center; flex-shrink:0; }

.teams { display:grid; grid-template-columns:1fr 76px 1fr; align-items:center; gap:6px; margin-bottom:9px; }
.team { font-family:'Orbitron',monospace; font-size:11px; font-weight:700; color:var(--txt); line-height:1.35; }
.team.r { text-align:right; }
.sc-box { text-align:center; }
.sc-live { font-family:'Orbitron',monospace; font-size:19px; color:#fff; font-weight:900; letter-spacing:3px; }
.sc-dash { color:var(--t3); font-size:15px; }
.sc-pred { font-size:7px; color:var(--t3); margin-top:2px; }

.odds3 { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-bottom:8px; }
.ob { text-align:center; padding:7px 3px; background:rgba(255,255,255,.02);
  border:1px solid var(--bdr); border-radius:var(--r2); }
.ob.hi { background:rgba(0,212,255,.08); border-color:rgba(0,212,255,.22); }
.ob-l { font-size:8px; color:var(--t3); margin-bottom:2px; }
.ob-l.hi { color:var(--c1); }
.ob-v { font-size:14px; font-weight:700; color:rgba(255,255,255,.5); }
.ob-v.hi { color:var(--c1); }
.ob-p { font-size:7px; color:var(--t3); margin-top:2px; }

.conf-row { display:flex; align-items:center; gap:6px; }
.conf-badges { display:flex; gap:4px; flex-shrink:0; }

/* ── EXPANDED ── */
.exp { margin-top:10px; border-top:1px solid var(--bdr); padding-top:10px; animation:fadeUp .25s ease; }
.exp-resume { font-size:9px; color:var(--t2); line-height:1.75; margin-bottom:8px; }
.exp-key { padding:6px 10px; background:rgba(255,215,0,.05); border-left:2px solid rgba(255,215,0,.4);
  border-radius:0 var(--r3) var(--r3) 0; font-size:9px; color:rgba(255,215,0,.8); line-height:1.5; margin-bottom:8px; }

.teams-stats { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
.ts-card { background:var(--bg3); border:1px solid var(--bdr); border-radius:var(--r2); padding:8px 10px; }
.ts-head { font-size:8px; color:var(--t3); letter-spacing:1px; margin-bottom:6px; text-transform:uppercase; }
.ts-row { display:flex; justify-content:space-between; margin-bottom:3px; }
.ts-lbl { font-size:8px; color:var(--t3); }
.ts-val { font-size:8px; font-weight:700; }
.forme { display:flex; gap:2px; margin-top:5px; }
.fl { width:15px; height:15px; border-radius:2px; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:700; }

.odds-extra { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-bottom:8px; }
.oe { text-align:center; padding:5px 2px; background:rgba(255,255,255,.015); border:1px solid var(--bdr); border-radius:var(--r3); }
.oe-l { font-size:7px; color:var(--t3); margin-bottom:1px; }
.oe-v { font-size:11px; font-weight:700; color:rgba(255,255,255,.45); }

.paris-list { margin-bottom:8px; }
.paris-item { display:flex; justify-content:space-between; align-items:center;
  padding:6px 9px; background:rgba(0,212,255,.04); border-radius:var(--r3); margin-bottom:3px; }
.paris-l { display:flex; flex-direction:column; gap:1px; }
.paris-type { font-size:7px; color:var(--t3); }
.paris-sel  { font-size:9px; color:var(--txt); }
.paris-r    { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
.paris-cote { font-size:13px; color:var(--c4); font-weight:700; }

.btn-add { margin-top:7px; width:100%; padding:8px; font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:1px; cursor:pointer; border-radius:var(--r2); transition:all .2s; }
.btn-add.add { background:rgba(0,212,255,.07); border:1px solid rgba(0,212,255,.2); color:var(--c1); }
.btn-add.rem { background:rgba(255,107,53,.07); border:1px solid rgba(255,107,53,.22); color:var(--c2); }

/* ─────────────────────────────────────────
   COMBO CARD
───────────────────────────────────────── */
.cc { border-radius:var(--r); padding:13px; margin-bottom:7px; animation:fadeUp .4s ease; }
.cc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:9px; gap:8px; }
.cc-name { font-family:'Orbitron',monospace; font-size:13px; font-weight:800; color:var(--txt); margin-top:5px; margin-bottom:2px; }
.cc-sub  { font-size:8px; color:var(--t3); }
.cc-cote { font-family:'Orbitron',monospace; font-size:26px; font-weight:900; line-height:1; }
.cc-mise { font-size:8px; color:var(--t3); margin-top:2px; }
.cc-gains { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin:8px 0; }
.gain-box { background:rgba(255,215,0,.06); border:1px solid rgba(255,215,0,.14);
  border-radius:var(--r3); padding:5px; text-align:center; }
.gain-m { font-size:7px; color:var(--t3); }
.gain-v { font-size:11px; color:var(--c4); font-weight:700; }
.sel-item { display:flex; justify-content:space-between; align-items:flex-start; gap:8px;
  padding:7px 9px; background:rgba(255,255,255,.02); border-radius:0 var(--r3) var(--r3) 0; margin-bottom:3px; }
.sel-l { flex:1; min-width:0; }
.sel-m { font-size:10px; color:var(--txt); }
.sel-meta { font-size:8px; color:var(--t3); margin-top:2px; line-height:1.5; }
.sel-r { text-align:right; flex-shrink:0; }
.sel-p { font-size:12px; font-weight:700; margin-bottom:2px; }
.sel-c { font-size:10px; color:var(--c4); }
.cc-desc { font-size:9px; color:var(--t3); line-height:1.65; margin-top:8px; padding-top:8px; border-top:1px solid var(--bdr); }
.cc-alert { margin-top:6px; font-size:8px; color:rgba(255,107,53,.7); padding:5px 8px;
  background:rgba(255,107,53,.05); border-radius:var(--r3); border-left:2px solid rgba(255,107,53,.4); }

/* ─────────────────────────────────────────
   INFO BOXES
───────────────────────────────────────── */
.box { border-radius:var(--r); padding:11px 13px; margin-bottom:8px; }
.box-title { font-size:8px; letter-spacing:2px; margin-bottom:5px; text-transform:uppercase; }
.box-txt   { font-size:10px; line-height:1.75; color:var(--t2); }
.box-c1 { background:rgba(0,212,255,.04); border:1px solid rgba(0,212,255,.12); }
.box-c4 { background:rgba(255,215,0,.03); border:1px solid rgba(255,215,0,.12); }

/* ─────────────────────────────────────────
   CUSTOM / VERDICT
───────────────────────────────────────── */
.custom-tip { background:var(--bg2); border:1px solid var(--bdr); border-radius:var(--r);
  padding:11px 13px; margin-bottom:11px; font-size:9px; color:var(--t3); line-height:1.75; }
.custom-tip span { color:var(--c1); }
.sel-row { display:flex; justify-content:space-between; align-items:center; gap:8px;
  padding:9px 12px; background:rgba(0,212,255,.04); border:1px solid rgba(0,212,255,.12);
  border-radius:var(--r); margin-bottom:5px; animation:slideIn .2s ease; }
.sel-row-info { flex:1; min-width:0; }
.sel-row-m { font-size:11px; color:var(--txt); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sel-row-sub { font-size:8px; color:var(--t3); margin-top:2px; }
.sel-row-r { display:flex; gap:6px; align-items:center; flex-shrink:0; }
.btn-rm { padding:3px 8px; background:rgba(255,107,53,.08); border:1px solid rgba(255,107,53,.2);
  color:var(--c2); font-family:'JetBrains Mono',monospace; font-size:8px; cursor:pointer; border-radius:var(--r3); }
.btn-analyze { width:100%; padding:12px; margin:4px 0 11px; background:rgba(0,212,255,.07);
  border:1px solid rgba(0,212,255,.22); color:var(--c1); font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:2px; cursor:pointer; border-radius:var(--r); transition:all .2s; }
.btn-analyze:active { background:rgba(0,212,255,.14); }
.btn-analyze:disabled { opacity:.35; cursor:not-allowed; }

.verdict { background:var(--bg2); border:1px solid var(--bdr); border-radius:var(--r);
  padding:14px; animation:fadeUp .4s ease; }
.verdict-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; gap:8px; }
.verdict-cote { font-family:'Orbitron',monospace; font-size:28px; font-weight:900; color:var(--c4); }
.verdict-sub  { font-size:8px; color:var(--t3); margin-top:2px; }
.verdict-right { text-align:right; }
.verdict-gains { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-top:10px; }
.verdict-txt  { font-size:9px; color:var(--t2); line-height:1.75; margin-bottom:6px; }
.verdict-tip  { font-size:9px; color:var(--c1); padding:7px 10px; background:rgba(0,212,255,.05);
  border-radius:var(--r3); line-height:1.6; margin-bottom:8px; }
.vlist { margin-bottom:6px; }
.vlist-h { font-size:7px; letter-spacing:2px; margin-bottom:4px; text-transform:uppercase; }
.vlist-i { display:flex; align-items:flex-start; gap:5px; font-size:9px; color:var(--t3);
  margin-bottom:3px; line-height:1.5; }

/* ── VALEURS ── */
.val-info { padding:9px 12px; background:rgba(255,215,0,.04); border:1px solid rgba(255,215,0,.12);
  border-radius:var(--r); margin-bottom:9px; font-size:9px; color:rgba(255,215,0,.6); line-height:1.7; }

/* ── EMPTY ── */
.empty { text-align:center; padding:48px 16px; color:var(--t3); font-size:10px; line-height:1.9; }
.empty-icon { font-size:36px; margin-bottom:12px; }

/* ── FOOTER ── */
.footer { text-align:center; margin-top:38px; padding-top:14px; border-top:1px solid var(--bdr); }
.footer-1 { font-size:7px; color:var(--t4); letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
.footer-2 { font-size:7px; color:rgba(255,107,53,.28); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="brand">
        <div class="brand-eye">Pronostics Temps Réel</div>
        <div class="brand-name">⚽ ORACLE</div>
        <div class="brand-date" id="dateDisp"></div>
      </div>
      <div class="hdr-right">
        <div class="hdr-meta" id="metaUp" style="display:none">MàJ <span id="metaT"></span></div>
        <div class="hdr-meta" id="metaNext" style="display:none">Next <span id="metaCD"></span></div>
        <button class="btn-ref" onclick="doRefresh()" id="btnRef">↻ REFRESH</button>
      </div>
    </div>
    <div class="stats" id="statsBar" style="display:none">
      <div class="stat"><div class="stat-v" id="sT" style="color:var(--c1)">—</div><div class="stat-l">Matchs</div></div>
      <div class="stat"><div class="stat-v" id="sL" style="color:var(--c3)">—</div><div class="stat-l">Live</div></div>
      <div class="stat"><div class="stat-v" id="sA" style="color:var(--c4)">—</div><div class="stat-l">À venir</div></div>
      <div class="stat"><div class="stat-v" id="sV" style="color:var(--c2)">—</div><div class="stat-l">💎</div></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs-wrap" id="tabsWrap" style="display:none">
    <div class="tabs">
      <button class="tab on" id="tab-matchs"  onclick="goTab('matchs')">⚽ MATCHS</button>
      <button class="tab"    id="tab-combos" onclick="goTab('combos')">🎯 COMBINÉS</button>
      <button class="tab"    id="tab-custom" onclick="goTab('custom')">🛠 COMBINÉ</button>
      <button class="tab"    id="tab-valeurs" onclick="goTab('valeurs')">💎 VALEURS</button>
    </div>
  </div>

  <!-- PANELS -->
  <div id="p-load"    style="display:none"><div class="loading">
    <div class="spinner"></div>
    <div class="load-h">ORACLE EN ANALYSE</div>
    <div class="load-p" id="lPhase"></div>
    <div class="phases" id="phaseList"></div>
  </div></div>
  <div id="p-err"     style="display:none"><div class="errbox"><div class="err-msg" id="errMsg"></div><button class="btn-retry" onclick="doRefresh()">↻ Réessayer</button></div></div>
  <div id="p-matchs"  style="display:none"></div>
  <div id="p-combos"  style="display:none"></div>
  <div id="p-custom"  style="display:none"></div>
  <div id="p-valeurs" style="display:none"></div>

  <div class="footer">
    <div class="footer-1">Oracle Live v5 · Claude AI + Web Search · Auto-refresh 15 min</div>
    <div class="footer-2">⚠ Informatif uniquement · Jouez responsable · 18+</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const S = { matchs:[], combos:null, selIds:[], fComp:'ALL', fStat:'ALL', tab:'matchs', custRes:null, busy:false };
let nextTs=null, cdInt=null, phInt=null, refTmr=null, phIdx=0;

const PHASES = [
  '🔍 Recherche des matchs du jour…',
  '📡 Récupération des cotes bookmakers…',
  '🧮 Calcul Poisson & probabilités…',
  '🤖 Analyse IA de chaque match…',
  '💎 Détection des valeurs cachées…',
  '✅ Génération des pronostics…',
];

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
const todayFR = () => new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const nowT    = () => new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
const clr     = v  => v>=75?'var(--c3)':v>=55?'var(--c1)':v>=40?'var(--c4)':'var(--c2)';
const tclr    = t  => ({SURE:'var(--c3)',VALEUR:'var(--c1)',RISQUE:'var(--c4)',JACKPOT:'var(--c2)'}[t]||'var(--c1)');
const esc     = s  => String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");

function bdg(txt, col) {
  return `<span class="badge" style="background:${col}1a;border:1px solid ${col}44;color:${col}">${txt}</span>`;
}
function barHTML(v) {
  const c = clr(v);
  return `<div class="bar"><div class="bar-t"><div class="bar-f" style="width:${v}%;background:${c}"></div></div><span class="bar-p" style="color:${c}">${v}%</span></div>`;
}
function formeHTML(f) {
  return (f||'?????').split('').map(r => {
    const bg = r==='W'?'rgba(0,255,136,.18)':r==='D'?'rgba(255,215,0,.15)':'rgba(255,107,53,.18)';
    const co = r==='W'?'#00ff88':r==='D'?'#ffd700':'#ff6b35';
    return `<div class="fl" style="background:${bg};color:${co}">${r}</div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('dateDisp').textContent = todayFR().toUpperCase();
  fetchMatches();
});

// ═══════════════════════════════════════════
// API
// ═══════════════════════════════════════════
async function fetchMatches() {
  if (S.busy) return;
  S.busy = true; S.combos = null; S.selIds = []; S.custRes = null;
  show('load'); phIdx = 0; buildPhases(); updatePhase();
  clearInterval(phInt);
  phInt = setInterval(() => { phIdx = Math.min(phIdx+1, PHASES.length-1); updatePhase(); }, 3500);

  try {
    const r = await fetch('/api/matches', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    const d = await r.json();
    clearInterval(phInt);
    if (d.error) throw new Error(d.error);
    if (!Array.isArray(d.matchs) || d.matchs.length < 1) throw new Error('Aucun match reçu. Réessaie dans quelques instants.');
    S.matchs = d.matchs;
    setMeta(); schedRefresh(); S.busy = false;
    renderAll(); fetchCombos();
  } catch(e) {
    clearInterval(phInt); S.busy = false; showErr(e.message);
  }
}

async function fetchCombos() {
  if (!S.matchs.length) return;
  const el = document.getElementById('tab-combos');
  el.textContent = '🎯 ···';
  try {
    const r = await fetch('/api/combos', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ matchs: S.matchs })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    if (!d.combos?.length) throw new Error('Combos vides');
    S.combos = d;
    el.textContent = `🎯 COMBINÉS (${d.combos.length})`;
    if (S.tab==='combos') renderCombos();
  } catch(e) {
    el.textContent = '🎯 COMBINÉS'; console.error('combos:', e.message);
  }
}

async function buildCustom() {
  if (S.selIds.length < 2) return;
  const btn = document.querySelector('.btn-analyze');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ ANALYSE…'; }
  try {
    const sel = S.matchs.filter(m => S.selIds.includes(m.id));
    const r = await fetch('/api/custom', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ matchs: sel })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    S.custRes = d; renderCustom();
  } catch(e) {
    console.error('custom:', e.message);
    if (btn) { btn.disabled = false; btn.textContent = `🔮 ANALYSER (${S.selIds.length} matchs)`; }
  }
}

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════
function show(id) {
  ['load','err','matchs','combos','custom','valeurs'].forEach(p =>
    document.getElementById('p-'+p).style.display = p===id ? 'block' : 'none'
  );
  const hasTabs = !['load','err'].includes(id);
  document.getElementById('tabsWrap').style.display = hasTabs ? 'block' : 'none';
  document.getElementById('statsBar').style.display = hasTabs ? 'flex' : 'none';
}
function showErr(msg) {
  document.getElementById('errMsg').textContent = '⚠ ' + msg;
  show('err');
}
function setMeta() {
  document.getElementById('metaUp').style.display = 'block';
  document.getElementById('metaT').textContent = nowT();
}
function schedRefresh() {
  nextTs = Date.now() + 15*60*1000;
  document.getElementById('metaNext').style.display = 'block';
  clearInterval(cdInt);
  cdInt = setInterval(() => {
    const d = nextTs - Date.now();
    if (d <= 0) { document.getElementById('metaCD').textContent = 'Bientôt…'; return; }
    document.getElementById('metaCD').textContent =
      Math.floor(d/60000) + ':' + String(Math.floor((d%60000)/1000)).padStart(2,'0');
  }, 1000);
  clearTimeout(refTmr);
  refTmr = setTimeout(fetchMatches, 15*60*1000);
}
function doRefresh() { if (!S.busy) fetchMatches(); }

function buildPhases() {
  document.getElementById('phaseList').innerHTML = PHASES.map((p,i) =>
    `<div class="ph" id="ph${i}" style="opacity:${i===0?1:.2}">
      <span class="ph-i" id="phi${i}">${i===0?'⏳':'○'}</span>
      <span class="ph-t" id="pht${i}" style="color:${i===0?'var(--c1)':'var(--t2)'}">${p}</span>
    </div>`
  ).join('');
}
function updatePhase() {
  document.getElementById('lPhase').textContent = PHASES[phIdx];
  PHASES.forEach((_,i) => {
    const el = document.getElementById('ph'+i); if (!el) return;
    el.style.opacity = i <= phIdx ? 1 : .2;
    document.getElementById('phi'+i).textContent = i < phIdx ? '✅' : i===phIdx ? '⏳' : '○';
    document.getElementById('pht'+i).style.color = i===phIdx ? 'var(--c1)' : 'var(--t2)';
  });
}
function updateStats() {
  const m = S.matchs;
  document.getElementById('sT').textContent = m.length;
  document.getElementById('sL').textContent = m.filter(x=>x.statut==='EN COURS').length;
  document.getElementById('sA').textContent = m.filter(x=>x.statut==='A VENIR').length;
  document.getElementById('sV').textContent = m.filter(x=>x.analyse?.valeur).length;
  document.getElementById('tab-matchs').textContent  = `⚽ MATCHS (${m.length})`;
  document.getElementById('tab-valeurs').textContent = `💎 VALEURS (${m.filter(x=>x.analyse?.valeur).length})`;
  document.getElementById('tab-custom').textContent  = S.selIds.length ? `🛠 COMBINÉ (${S.selIds.length})` : '🛠 COMBINÉ';
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function goTab(t) {
  S.tab = t;
  ['matchs','combos','custom','valeurs'].forEach(id => {
    document.getElementById('tab-'+id).classList.toggle('on', id===t);
    document.getElementById('p-'+id).style.display = id===t ? 'block' : 'none';
  });
  if (t==='matchs')  renderMatchs();
  if (t==='combos')  renderCombos();
  if (t==='custom')  renderCustom();
  if (t==='valeurs') renderValeurs();
}
function renderAll() {
  updateStats(); show(S.tab); goTab(S.tab);
}

// ═══════════════════════════════════════════
// MATCHS
// ═══════════════════════════════════════════
function renderMatchs() {
  const comps = ['ALL', ...new Set(S.matchs.map(m=>m.competition))];
  const fil = S.matchs.filter(m =>
    (S.fComp==='ALL' || m.competition===S.fComp) &&
    (S.fStat==='ALL' || m.statut===S.fStat)
  );
  const liveC = S.matchs.filter(m=>m.statut==='EN COURS').length;

  let h = `<div class="filters">
    <div class="frow">
      ${comps.slice(0,9).map(c=>`<button class="fb${S.fComp===c?' on':''}" onclick="setFC('${esc(c)}')">${c==='ALL'?'Toutes':c}</button>`).join('')}
    </div>
    <div class="frow">
      ${['ALL','A VENIR','EN COURS','TERMINE'].map(s=>`<button class="fb${S.fStat===s?' on':''}" onclick="setFS('${s}')">${s==='ALL'?'Tous':s}</button>`).join('')}
    </div>
  </div>`;

  if (liveC > 0) h += `<div class="live-band">
    <div class="dot"><div class="dot-c"></div><span class="dot-t">LIVE</span></div>
    <span class="live-band-t">${liveC} match(s) en direct maintenant</span>
  </div>`;

  if (!fil.length) h += `<div class="empty"><div class="empty-icon">🔍</div>Aucun match pour ces filtres.</div>`;
  else fil.forEach(m => h += cardHTML(m));

  document.getElementById('p-matchs').innerHTML = h;
}

function cardHTML(m) {
  const a = m.analyse||{}, c = m.cotes||{}, pr = a.pronostic||'';
  const hiMap = {'1':['1','1N','12'],'N':['N','1N','N2'],'2':['2','N2','12']};
  const hi = hiMap[pr]||[];
  const sel = S.selIds.includes(m.id);
  const sc  = m.statut==='EN COURS'?'var(--c3)':m.statut==='TERMINE'?'#444':'var(--c1)';

  return `
<div class="mc${sel?' sel':''}" id="mc-${m.id}" onclick="togExp('${esc(m.id)}')">
  <div class="mc-top">
    <span class="mc-comp">${m.flag||'⚽'} ${m.competition||''}${m.journee?' · '+m.journee:''} <span style="opacity:.6">${m.heure||''}</span></span>
    <div class="mc-badges">
      ${m.statut==='EN COURS'?`<div class="dot"><div class="dot-c"></div><span class="dot-t">LIVE</span></div>`:''}
      ${bdg(m.statut||'A VENIR', sc)}
    </div>
  </div>
  <div class="teams">
    <div class="team">${m.domicile||'?'}</div>
    <div class="sc-box">
      ${m.score_actuel?`<div class="sc-live">${m.score_actuel}</div>`:`<div class="sc-dash">–</div>`}
      <div class="sc-pred">🎯 ${a.score_predit||'?-?'}</div>
    </div>
    <div class="team r">${m.exterieur||'?'}</div>
  </div>
  <div class="odds3">
    ${['1','N','2'].map((l,i)=>{
      const vs=[c.dom,c.nul,c.ext], ps=[a.prob_dom||0,a.prob_nul||0,a.prob_ext||0], ih=hi.includes(l);
      return `<div class="ob${ih?' hi':''}">
        <div class="ob-l${ih?' hi':''}">${l}</div>
        <div class="ob-v${ih?' hi':''}">${vs[i]||'—'}</div>
        <div class="ob-p">${ps[i]}%</div>
      </div>`;
    }).join('')}
  </div>
  <div class="conf-row">
    <div style="flex:1">${barHTML(a.confiance||0)}</div>
    <div class="conf-badges">
      ${bdg('⚽ '+(pr||'?'), clr(a.confiance||0))}
      ${a.valeur?bdg('💎 VAL','var(--c4)'):''}
    </div>
  </div>
  <div id="exp-${m.id}" style="display:none">
    <div class="exp">
      ${a.resume?`<div class="exp-resume">${a.resume}</div>`:''}
      ${a.facteur_cle?`<div class="exp-key">⚡ ${a.facteur_cle}</div>`:''}
      <div class="teams-stats">
        ${[{n:m.domicile,cl:a.classement_dom,bm:a.buts_marques_dom,be:a.buts_encaisses_dom,l:a.lambda_dom,f:a.forme_dom},
           {n:m.exterieur,cl:a.classement_ext,bm:a.buts_marques_ext,be:a.buts_encaisses_ext,l:a.lambda_ext,f:a.forme_ext}]
          .map(t=>`<div class="ts-card">
            <div class="ts-head">${t.n||'?'}</div>
            ${t.cl?`<div class="ts-row"><span class="ts-lbl">Classement</span><span class="ts-val" style="color:var(--c1)">${t.cl}</span></div>`:''}
            ${t.bm?`<div class="ts-row"><span class="ts-lbl">⚽ / match</span><span class="ts-val" style="color:var(--c3)">${t.bm}</span></div>`:''}
            ${t.be?`<div class="ts-row"><span class="ts-lbl">🥅 enc.</span><span class="ts-val" style="color:var(--c2)">${t.be}</span></div>`:''}
            ${t.l?`<div class="ts-row"><span class="ts-lbl">λ Poisson</span><span class="ts-val" style="color:var(--c4)">${t.l}</span></div>`:''}
            <div class="forme">${formeHTML(t.f)}</div>
          </div>`).join('')}
      </div>
      ${(c.btts_oui||c.over25||c.over35)?`<div class="odds-extra">
        ${c.btts_oui?`<div class="oe"><div class="oe-l">BTTS Oui</div><div class="oe-v">${c.btts_oui}</div></div>`:''}
        ${c.btts_non?`<div class="oe"><div class="oe-l">BTTS Non</div><div class="oe-v">${c.btts_non}</div></div>`:''}
        ${c.over15 ?`<div class="oe"><div class="oe-l">Over 1.5</div><div class="oe-v">${c.over15}</div></div>`:''}
        ${c.over25 ?`<div class="oe"><div class="oe-l">Over 2.5</div><div class="oe-v">${c.over25}</div></div>`:''}
        ${c.over35 ?`<div class="oe"><div class="oe-l">Over 3.5</div><div class="oe-v">${c.over35}</div></div>`:''}
        ${c.dc_1n  ?`<div class="oe"><div class="oe-l">DC 1N</div><div class="oe-v">${c.dc_1n}</div></div>`:''}

            </div>
            <div class="paris-r">

        ${sel?'✕ RETIRER DU COMBINÉ':'+ AJOUTER AU COMBINÉ'}
      </button>
    </div>
  </div>
</div>`;
}

function togExp(id) {
  const el = document.getElementById('exp-'+id);
  if (el) el.style.display = el.style.display==='none' ? 'block' : 'none';
}
function setFC(c) { S.fComp=c; renderMatchs(); }
function setFS(s) { S.fStat=s; renderMatchs(); }
function togSel(id) {
  S.selIds = S.selIds.includes(id) ? S.selIds.filter(i=>i!==id) : [...S.selIds, id];
  S.custRes = null; updateStats(); renderMatchs();
  if (S.tab==='custom') renderCustom();
}

function renderCombos() {
  const p = document.getElementById('p-combos');
  if (!S.combos) {
    p.innerHTML = `<div class="empty"><div class="empty-icon">🎯</div>Les combinés se génèrent automatiquement.<br>Patiente quelques secondes…<br><br><button class="btn-ref" onclick="fetchCombos()">Générer maintenant</button></div>`;
    return;
  }
  const d = S.combos;
  let h = '';
  if (d.conseil_jour) h += `<div class="box box-c1"><div class="box-title" style="color:var(--c1)">💡 Conseil du jour</div><div class="box-txt">${d.conseil_jour}</div></div>`;
  if (d.bankroll)     h += `<div class="box box-c4"><div class="box-title" style="color:var(--c4)">💰 Bankroll</div><div class="box-txt">${d.bankroll}</div></div>`;

  (d.combos||[]).forEach(cb => {
    const col = tclr(cb.type);
    h += `<div class="cc" style="background:linear-gradient(135deg,${col.replace('var(--','').replace(')','')},var(--bg2));background:linear-gradient(135deg,rgba(0,0,0,.0),var(--bg2));border:1px solid ${col}22;border-color:${col}22">
      <div style="border-radius:var(--r);background:linear-gradient(135deg,${col}0d,transparent);padding:13px;margin:-13px -13px 9px;border-radius:var(--r) var(--r) 0 0">
        <div class="cc-top">
          <div>
            ${bdg(cb.type+' '+(cb.emoji||''), col)}
            <div class="cc-name">${cb.nom||cb.type}</div>
            <div class="cc-sub">${cb.nb||0} sélections · conf. ${cb.confiance||0}%</div>
          </div>
          <div style="text-align:right">
            <div class="cc-cote" style="color:${col}">${cb.cote||'?'}x</div>
            <div class="cc-mise">${cb.mise_conseil||''}</div>
          </div>
        </div>
        ${barHTML(cb.confiance||0)}
      </div>
      <div class="cc-gains">
        ${cb.gain_10?`<div class="gain-box"><div class="gain-m">10€</div><div class="gain-v">${cb.gain_10}</div></div>`:''}
        ${cb.gain_20?`<div class="gain-box"><div class="gain-m">20€</div><div class="gain-v">${cb.gain_20}</div></div>`:''}
        ${cb.gain_50?`<div class="gain-box"><div class="gain-m">50€</div><div class="gain-v">${cb.gain_50}</div></div>`:''}
      </div>
      <div>
        ${(cb.sels||[]).map(s=>`
          <div class="sel-item" style="border-left:2px solid ${col}55">
            <div class="sel-l">
              <div class="sel-m">${s.match||''}</div>
              <div class="sel-meta">${s.comp||''} · ${s.heure||''}<br>${s.why||s.raison||''}</div>
            </div>
            <div class="sel-r">
              <div class="sel-p" style="color:${col}">${s.sel||''}</div>
              <div class="sel-c">@${s.cote||'?'}</div>
            </div>
          </div>`).join('')}
      </div>
      ${cb.description?`<div class="cc-desc">${cb.description}</div>`:''}
      ${cb.alerte?`<div class="cc-alert">⚠ ${cb.alerte}</div>`:''}
    </div>`;
  });
  p.innerHTML = h;
}

function renderCustom() {
  const selM = S.matchs.filter(m => S.selIds.includes(m.id));
  let h = `<div class="custom-tip">Ouvre un match dans <span>⚽ MATCHS</span> puis clique <span>+ AJOUTER AU COMBINÉ</span>. Oracle analysera ton combiné personnalisé avec un verdict expert.</div>`;

  if (!selM.length) {
    h += `<div class="empty"><div class="empty-icon">🛠</div>Aucun match sélectionné.<br>Ajoute des matchs depuis l'onglet Matchs.</div>`;
    document.getElementById('p-custom').innerHTML = h; return;
  }

  selM.forEach(m => {
    h += `<div class="sel-row">
      <div class="sel-row-info">
        <div class="sel-row-m">${m.domicile} vs ${m.exterieur}</div>
        <div class="sel-row-sub">${m.competition} · ${m.heure} · Prono: ${m.analyse?.pronostic||'?'} · Score: ${m.analyse?.score_predit||'?'}</div>
      </div>
      <div class="sel-row-r">
        ${bdg(m.analyse?.pronostic||'?','var(--c1)')}

      </div>
    </div>`;
  });

  h += `<button class="btn-analyze" onclick="buildCustom()" ${selM.length<2?'disabled':''}>
    ${S.custRes?'↻ RECALCULER':'🔮 ANALYSER MON COMBINÉ ('+selM.length+' matchs)'}

  if (S.custRes) {
    const cr = S.custRes;
    const vc = cr.verdict==='JOUER'?'var(--c3)':cr.verdict==='PRUDENCE'?'var(--c4)':'var(--c2)';
    h += `<div class="verdict">
      <div class="verdict-top">
        <div>
          <div class="verdict-cote">${cr.cote||'?'}x</div>
          ${cr.verdict_label?`<div class="verdict-sub">${cr.verdict_label}</div>`:''}
        </div>
        <div class="verdict-right">
          ${bdg(cr.verdict||'?', vc)}
          <div style="margin-top:7px;min-width:120px">${barHTML(cr.confiance||0)}</div>
        </div>
      </div>
      ${cr.analyse?`<div class="verdict-txt">${cr.analyse}</div>`:''}
      ${cr.conseil?`<div class="verdict-tip">💡 ${cr.conseil}</div>`:''}
      <div class="verdict-gains">
        ${cr.gain_10?`<div class="gain-box"><div class="gain-m">10€</div><div class="gain-v">${cr.gain_10}</div></div>`:''}
        ${cr.gain_20?`<div class="gain-box"><div class="gain-m">20€</div><div class="gain-v">${cr.gain_20}</div></div>`:''}
        ${cr.gain_50?`<div class="gain-box"><div class="gain-m">50€</div><div class="gain-v">${cr.gain_50}</div></div>`:''}
      </div>
      ${(cr.forces||[]).length?`<div class="vlist" style="margin-top:10px">
        <div class="vlist-h" style="color:var(--c3)">✓ Points forts</div>
        ${cr.forces.map(f=>`<div class="vlist-i"><span style="color:var(--c3)">•</span>${f}</div>`).join('')}
      </div>`:''}
      ${(cr.risques||[]).length?`<div class="vlist" style="margin-top:6px">
        <div class="vlist-h" style="color:var(--c2)">⚠ Risques</div>
        ${cr.risques.map(r=>`<div class="vlist-i"><span style="color:var(--c2)">•</span>${r}</div>`).join('')}
      </div>`:''}
      ${cr.suggestion?`<div class="cc-alert" style="margin-top:8px">💡 ${cr.suggestion}</div>`:''}
    </div>`;
  }
  document.getElementById('p-custom').innerHTML = h;
}

function renderValeurs() {
  const vm = S.matchs.filter(m => m.analyse?.valeur);
  let h = `<div class="val-info">💎 <strong>Valeur détectée</strong> = Oracle estime la vraie probabilité supérieure à celle implicite dans la cote bookmaker. Ce sont les meilleures opportunités du jour.</div>`;
  if (!vm.length) h += `<div class="empty"><div class="empty-icon">💎</div>Aucune valeur détectée aujourd'hui.</div>`;
  else vm.forEach(m => h += cardHTML(m));
  document.getElementById('p-valeurs').innerHTML = h;
}
</script>
