<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>⚽ Oracle Live</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#060910;color:#dde8f0;font-family:'Share Tech Mono','Courier New',monospace;min-height:100vh;overflow-x:hidden}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes lp{0%,100%{opacity:1;box-shadow:0 0 6px #00ff88}50%{opacity:.4;box-shadow:0 0 14px #00ff88}}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:2px}

/* LAYOUT */
.wrap{max-width:600px;margin:0 auto;padding:16px 12px 80px}

/* HEADER */
.header{margin-bottom:18px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start}
.brand-sub{font-size:7px;letter-spacing:4px;color:rgba(0,212,255,.4);margin-bottom:3px}
.brand-title{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#00d4ff,#fff 50%,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-date{font-size:8px;color:rgba(255,255,255,.2);letter-spacing:2px;margin-top:2px}
.header-right{text-align:right;flex-shrink:0}
.last-up{font-size:8px;color:rgba(255,255,255,.25);margin-bottom:2px}
.last-time{color:rgba(0,212,255,.5)}
.next-ref{font-size:8px;color:rgba(255,255,255,.2)}
.cd{font-family:monospace;color:rgba(0,212,255,.5);font-size:10px}
.ref-btn{margin-top:6px;padding:5px 12px;background:transparent;border:1px solid rgba(0,212,255,.2);color:rgba(0,212,255,.6);font-family:monospace;font-size:8px;letter-spacing:2px;cursor:pointer;border-radius:4px;display:block;margin-left:auto}

/* STATS */
.stats{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column}
.sv{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;line-height:1}
.sl{font-size:7px;color:rgba(255,255,255,.25);letter-spacing:1px;margin-top:2px}

/* TABS */
.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 12px;border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.35);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;border-radius:4px;white-space:nowrap;transition:all .2s}
.tab.on{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.35);color:#00d4ff}

/* FILTERS */
.frow{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.fb{padding:3px 8px;border:1px solid rgba(255,255,255,.07);background:transparent;color:rgba(255,255,255,.3);cursor:pointer;font-family:monospace;font-size:8px;border-radius:3px;white-space:nowrap}
.fb.on{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.25);color:#00d4ff}

/* LOADING */
.loading{text-align:center;padding:50px 16px;animation:fu .3s ease}
.spinner{width:36px;height:36px;border:2px solid rgba(0,212,255,.1);border-top:2px solid #00d4ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
.load-title{font-family:'Orbitron',monospace;font-size:13px;color:#00d4ff;margin-bottom:6px;letter-spacing:2px}
.load-phase{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:20px}
.phase-box{max-width:300px;margin:0 auto;background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.1);border-radius:8px;padding:12px}
.pi{display:flex;align-items:center;gap:8px;padding:3px 0;transition:opacity .5s}
.pi-icon{font-size:10px}
.pi-txt{font-size:9px}

/* ERROR */
.errbox{padding:14px;background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.2);border-radius:8px;margin-bottom:14px}
.errmsg{color:#ff6b35;font-size:11px;margin-bottom:8px;line-height:1.5}
.retry{padding:6px 16px;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);color:#ff6b35;font-family:monospace;font-size:9px;cursor:pointer;border-radius:4px}

/* MATCH CARD */
.mc{background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:all .2s;animation:fu .3s ease}
.mc.sel{background:rgba(0,212,255,.05);border-color:rgba(0,212,255,.25)}
.mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mc-comp{font-size:9px;color:rgba(255,255,255,.3)}
.mc-time{font-family:monospace;font-size:9px}
.mc-badges{display:flex;gap:5px;align-items:center}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:8px;font-family:monospace;letter-spacing:1px;font-weight:700}
.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;margin-bottom:8px}
.tn{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:#e8f0f8;line-height:1.3}
.tn.r{text-align:right}
.sc-box{text-align:center}
.sc-live{font-family:'Orbitron',monospace;font-size:16px;color:#fff;font-weight:900;letter-spacing:2px}
.sc-dash{color:rgba(255,255,255,.2);font-size:12px}
.sc-pred{font-size:8px;color:rgba(255,255,255,.2);margin-top:1px}
.odds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px}
.ob{text-align:center;padding:6px 3px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:5px}
.ob.hi{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.22)}
.ol{font-size:8px;color:rgba(255,255,255,.3);margin-bottom:2px}
.ol.hi{color:#00d4ff}
.ov{font-family:monospace;font-size:14px;font-weight:900;color:rgba(255,255,255,.5)}
.ov.hi{color:#00d4ff}
.op{font-size:8px;color:rgba(255,255,255,.2);margin-top:1px}
.cbar{display:flex;align-items:center;gap:6px}
.bw{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px}
.bf{height:100%;border-radius:2px;transition:width 1s}
.bpct{font-size:9px;font-family:monospace;min-width:26px;text-align:right}

/* EXPANDED */
.exp{margin-top:10px;border-top:1px solid rgba(255,255,255,.05);padding-top:10px;animation:fu .25s ease}
.resume{font-size:10px;color:rgba(255,255,255,.45);line-height:1.6;margin-bottom:7px}
.facteur{padding:6px 9px;background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.12);border-radius:5px;margin-bottom:7px;font-size:9px;color:rgba(255,255,255,.45)}
.forme-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:7px}
.fc{padding:6px;background:rgba(255,255,255,.02);border-radius:5px}
.fl{font-size:8px;color:rgba(255,255,255,.25);margin-bottom:3px}
.fls{display:flex;gap:2px}
.fl-l{width:14px;height:14px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900}
.pl{margin-bottom:7px}
.pi-bet{display:flex;justify-content:space-between;padding:5px 8px;background:rgba(0,212,255,.03);border-radius:4px;margin-bottom:2px}
.pt{font-size:9px;color:rgba(255,255,255,.4)}
.ps{color:#e0e8f0}
.pc{font-family:monospace;font-size:11px;color:#ffd700;font-weight:700}
.addbtn{margin-top:7px;width:100%;padding:7px;font-family:monospace;font-size:9px;letter-spacing:1px;cursor:pointer;border-radius:5px}
.addbtn.add{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.2);color:#00d4ff}
.addbtn.rm{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);color:#ff6b35}

/* LIVE */
.ldot{display:inline-flex;align-items:center;gap:4px}
.ldc{width:6px;height:6px;border-radius:50%;background:#00ff88;animation:lp 1.2s infinite}
.ldt{font-size:8px;color:#00ff88;letter-spacing:2px}
.livebanner{padding:7px 11px;background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.15);border-radius:6px;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.lbt{font-size:9px;color:rgba(255,255,255,.35)}

/* COMBO CARD */
.cc{border-radius:10px;padding:14px;margin-bottom:10px;animation:fu .4s ease}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cc-name{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#e8f0f8;margin-top:5px}
.cc-nb{font-size:8px;color:rgba(255,255,255,.3);margin-top:2px}
.cc-cote{font-family:'Orbitron',monospace;font-size:22px;font-weight:900}
.cc-mise{font-size:8px;color:rgba(255,255,255,.3)}
.cc-gain{font-size:10px;color:#ffd700;font-family:monospace;font-weight:700}
.si{display:flex;justify-content:space-between;align-items:center;padding:5px 9px;background:rgba(255,255,255,.02);border-radius:0 5px 5px 0;margin-bottom:3px}
.sm{font-size:9px;color:#e0e8f0}
.st{color:rgba(255,255,255,.25);font-size:8px}
.sr{font-size:8px;color:rgba(255,255,255,.3);margin-top:1px}
.ss{text-align:right;flex-shrink:0;margin-left:8px}
.sp{font-family:monospace;font-size:11px;font-weight:700}
.sc2{font-size:10px;color:#ffd700;font-family:monospace}
.cd2{font-size:9px;color:rgba(255,255,255,.35);line-height:1.5;margin-top:6px}
.cw{margin-top:5px;font-size:8px;color:rgba(255,107,53,.6);padding:4px 7px;background:rgba(255,107,53,.05);border-radius:3px}

/* INFO BOXES */
.ibox{padding:10px 12px;border-radius:7px;margin-bottom:10px}
.ibox-t{font-size:8px;letter-spacing:2px;margin-bottom:3px}
.ibox-c{font-size:10px;line-height:1.6}
.conseil{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.12)}
.bankroll{background:rgba(255,215,0,.03);border:1px solid rgba(255,215,0,.1)}

/* CUSTOM */
.cinfo{padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:7px;margin-bottom:12px;font-size:9px;color:rgba(255,255,255,.35);line-height:1.6}
.cinfo span{color:#00d4ff}
.srow{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.12);border-radius:6px;margin-bottom:5px}
.sn{font-size:11px;color:#e0e8f0}
.stime{margin-left:6px;font-size:8px;color:rgba(255,255,255,.25)}
.sright{display:flex;gap:6px;align-items:center}
.rmbtn{padding:2px 7px;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.2);color:#ff6b35;font-family:monospace;font-size:8px;cursor:pointer;border-radius:3px}
.anabtn{width:100%;padding:11px;margin:4px 0 12px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.25);color:#00d4ff;font-family:monospace;font-size:9px;letter-spacing:2px;cursor:pointer;border-radius:6px}
.vbox{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px;animation:fu .4s ease}
.vhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.vcote{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ffd700}
.vgain{font-size:9px;color:#ffd700;font-family:monospace}
.vana{font-size:10px;color:rgba(255,255,255,.45);line-height:1.6;margin-bottom:7px}
.vcons{font-size:10px;color:#00d4ff;margin-bottom:7px}
.vrisk{font-size:8px;color:rgba(255,107,53,.6);margin-bottom:3px}

/* VALEUR */
.vinfo{padding:9px 12px;background:rgba(255,215,0,.03);border:1px solid rgba(255,215,0,.1);border-radius:6px;margin-bottom:10px;font-size:9px;color:rgba(255,215,0,.55);line-height:1.6}
.empty{text-align:center;padding:40px;color:rgba(255,255,255,.2);font-size:10px}
.gen-btn{padding:9px 22px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);color:#00d4ff;font-family:monospace;font-size:10px;cursor:pointer;border-radius:6px}

/* FOOTER */
.footer{text-align:center;margin-top:36px;border-top:1px solid rgba(255,255,255,.04);padding-top:14px}
.ft1{font-size:7px;color:rgba(255,255,255,.1);letter-spacing:2px;margin-bottom:3px}
.ft2{font-size:7px;color:rgba(255,107,53,.25)}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="brand-sub">PRONOSTICS TEMPS RÉEL</div>
        <div class="brand-title">⚽ ORACLE</div>
        <div class="brand-date" id="dateDisp"></div>
      </div>
      <div class="header-right">
        <div class="last-up" id="lastUpRow" style="display:none">MàJ: <span class="last-time" id="lastT"></span></div>
        <div class="next-ref" id="nextRow" style="display:none">Next: <span class="cd" id="cd"></span></div>
        <button class="ref-btn" onclick="doRefresh()">↻ REFRESH</button>
      </div>
    </div>
    <div class="stats" id="statsRow" style="display:none">
      <div class="stat"><div class="sv" id="sTotal" style="color:#00d4ff">0</div><div class="sl">MATCHS</div></div>
      <div class="stat"><div class="sv" id="sLive" style="color:#00ff88">0</div><div class="sl">LIVE</div></div>
      <div class="stat"><div class="sv" id="sAvenir" style="color:#ffd700">0</div><div class="sl">À VENIR</div></div>
      <div class="stat"><div class="sv" id="sVal" style="color:#ff6b35">0</div><div class="sl">💎</div></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabsRow" style="display:none">
    <button class="tab on" id="tab-matchs" onclick="setTab('matchs')">⚽ MATCHS</button>
    <button class="tab" id="tab-combos" onclick="setTab('combos')">🎯 COMBINÉS</button>
    <button class="tab" id="tab-custom" onclick="setTab('custom')">🛠 MON COMBINÉ</button>
    <button class="tab" id="tab-valeurs" onclick="setTab('valeurs')">💎 VALEURS</button>
  </div>

  <!-- LOADING -->
  <div id="loadBox" style="display:none" class="loading">
    <div class="spinner"></div>
    <div class="load-title">ORACLE EN ANALYSE</div>
    <div class="load-phase" id="lPhase">🔍 Recherche...</div>
    <div class="phase-box" id="phaseBox"></div>
  </div>

  <!-- ERROR -->
  <div id="errBox" style="display:none" class="errbox">
    <div class="errmsg" id="errMsg"></div>
    <button class="retry" onclick="doRefresh()">↻ Réessayer</button>
  </div>

  <!-- PANELS -->
  <div id="p-matchs" style="display:none"></div>
  <div id="p-combos" style="display:none"></div>
  <div id="p-custom" style="display:none"></div>
  <div id="p-valeurs" style="display:none"></div>

  <div class="footer">
    <div class="ft1">ORACLE LIVE · CLAUDE AI + WEB SEARCH · AUTO-REFRESH 15MIN</div>
    <div class="ft2">⚠ Informatif uniquement · Jouez responsable · 18+</div>
  </div>
</div>

<script>
// ── STATE ──
let S = { matchs:[], combos:null, selIds:[], fComp:"ALL", fStat:"ALL", tab:"matchs", custRes:null };
let nextTs=null, cdInt=null, phInt=null, refTmr=null, phIdx=0;

const PHASES=["🔍 Recherche des matchs...","📡 Cotes bookmakers...","🧮 Calcul probabiliste...","🤖 Analyse IA...","💎 Valeurs détectées...","✅ Finalisation..."];

function todayFR(){return new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}
function nowT(){return new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});}
function cc(v){return v>=75?"#00ff88":v>=55?"#00d4ff":v>=40?"#ffd700":"#ff6b35";}
function tc(t){return{SURE:"#00ff88",VALEUR:"#00d4ff",RISQUE:"#ffd700",JACKPOT:"#ff6b35"}[t]||"#00d4ff";}
function bdg(l,c){return`<span class="badge" style="background:${c}18;border:1px solid ${c}44;color:${c}">${l}</span>`;}
function bar(v){const c=cc(v);return`<div class="cbar"><div class="bw"><div class="bf" style="width:${v}%;background:${c}"></div></div><span class="bpct" style="color:${c}">${v}%</span></div>`;}

// ── INIT ──
document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("dateDisp").textContent=todayFR().toUpperCase();
  fetchMatches();
});

// ── FETCH ──
async function fetchMatches(){
  show("load");phIdx=0;clearInterval(phInt);
  S.combos=null;S.selIds=[];S.custRes=null;
  buildPhaseBox();updatePhase();
  phInt=setInterval(()=>{phIdx=Math.min(phIdx+1,PHASES.length-1);updatePhase();},3200);
  try{
    const r=await fetch("/api/matches",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    const d=await r.json();
    clearInterval(phInt);
    if(d.error)throw new Error(d.error);
    if(!Array.isArray(d.matchs))throw new Error("Données invalides");
    S.matchs=d.matchs;
    setLU();schedRef();
    show("content");renderAll();fetchCombos();
  }catch(e){clearInterval(phInt);show("err",e.message);}
}

async function fetchCombos(){
  if(!S.matchs.length)return;
  document.getElementById("tab-combos").textContent="🎯 COMBINÉS ...";
  try{
    const r=await fetch("/api/combos",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({matchs:S.matchs})});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    S.combos=d;
    document.getElementById("tab-combos").textContent=`🎯 COMBINÉS (${d.combos?.length||0})`;
    if(S.tab==="combos")renderCombos();
  }catch(e){document.getElementById("tab-combos").textContent="🎯 COMBINÉS IA";}
}

async function buildCustom(){
  if(S.selIds.length<2)return;
  const btn=document.querySelector(".anabtn");if(btn)btn.textContent="Analyse...";
  try{
    const sel=S.matchs.filter(m=>S.selIds.includes(m.id));
    const r=await fetch("/api/custom",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({matchs:sel})});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    S.custRes=d;renderCustom();
  }catch(e){console.error(e);}
  if(document.querySelector(".anabtn"))document.querySelector(".anabtn").textContent=`🔮 ANALYSER (${S.selIds.length} matchs)`;
}

// ── UI ──
function show(mode,msg=""){
  document.getElementById("loadBox").style.display=mode==="load"?"block":"none";
  document.getElementById("errBox").style.display=mode==="err"?"block":"none";
  ["p-matchs","p-combos","p-custom","p-valeurs"].forEach(id=>document.getElementById(id).style.display="none");
  document.getElementById("tabsRow").style.display=mode==="content"?"flex":"none";
  document.getElementById("statsRow").style.display=mode==="content"?"flex":"none";
  if(mode==="err"){document.getElementById("errMsg").textContent="⚠ "+msg;}
  if(mode==="content"){document.getElementById("p-"+S.tab).style.display="block";}
}

function buildPhaseBox(){
  document.getElementById("phaseBox").innerHTML=PHASES.map((p,i)=>`<div class="pi" id="ph${i}" style="opacity:${i===0?1:.2}"><span class="pi-icon">${i===0?"⏳":"○"}</span><span class="pi-txt" style="color:${i===0?"#00d4ff":"rgba(255,255,255,.35)"}">${p}</span></div>`).join("");
}
function updatePhase(){
  document.getElementById("lPhase").textContent=PHASES[phIdx];
  PHASES.forEach((_,i)=>{
    const el=document.getElementById("ph"+i);if(!el)return;
    el.style.opacity=i<=phIdx?1:.2;
    el.querySelector(".pi-icon").textContent=i<phIdx?"✅":i===phIdx?"⏳":"○";
    el.querySelector(".pi-txt").style.color=i===phIdx?"#00d4ff":"rgba(255,255,255,.35)";
  });
}
function setLU(){document.getElementById("lastUpRow").style.display="block";document.getElementById("lastT").textContent=nowT();}
function schedRef(){
  nextTs=Date.now()+15*60*1000;
  document.getElementById("nextRow").style.display="block";
  clearInterval(cdInt);
  cdInt=setInterval(()=>{const d=nextTs-Date.now();if(d<=0){document.getElementById("cd").textContent="Refresh...";return;}document.getElementById("cd").textContent=`${Math.floor(d/60000)}:${String(Math.floor((d%60000)/1000)).padStart(2,"0")}`;},1000);
  clearTimeout(refTmr);refTmr=setTimeout(()=>fetchMatches(),15*60*1000);
}
function doRefresh(){fetchMatches();}

function setTab(t){
  S.tab=t;
  ["matchs","combos","custom","valeurs"].forEach(id=>{
    document.getElementById("tab-"+id).classList.toggle("on",id===t);
    document.getElementById("p-"+id).style.display=id===t?"block":"none";
  });
  if(t==="matchs")renderMatchs();
  if(t==="combos")renderCombos();
  if(t==="custom")renderCustom();
  if(t==="valeurs")renderValeurs();
}

function renderAll(){
  // update stats
  document.getElementById("sTotal").textContent=S.matchs.length;
  document.getElementById("sLive").textContent=S.matchs.filter(m=>m.statut==="EN COURS").length;
  document.getElementById("sAvenir").textContent=S.matchs.filter(m=>m.statut==="A VENIR").length;
  document.getElementById("sVal").textContent=S.matchs.filter(m=>m.analyse?.valeur).length;
  document.getElementById("tab-matchs").textContent=`⚽ MATCHS (${S.matchs.length})`;
  document.getElementById("tab-valeurs").textContent=`💎 VALEURS (${S.matchs.filter(m=>m.analyse?.valeur).length})`;
  setTab(S.tab);
}

// ── MATCHS ──
function renderMatchs(){
  const comps=["ALL",...new Set(S.matchs.map(m=>m.competition))];
  const fil=S.matchs.filter(m=>{
    if(S.fComp!=="ALL"&&m.competition!==S.fComp)return false;
    if(S.fStat!=="ALL"&&m.statut!==S.fStat)return false;
    return true;
  });
  const liveC=S.matchs.filter(m=>m.statut==="EN COURS").length;

  let h=`<div style="margin-bottom:10px">
    <div class="frow">${comps.slice(0,8).map(c=>`<button class="fb${S.fComp===c?" on":""}" onclick="setFC('${c.replace(/'/g,"\\'")}')"> ${c==="ALL"?"TOUTES":c}</button>`).join("")}</div>
    <div class="frow">${["ALL","A VENIR","EN COURS","TERMINE"].map(s=>`<button class="fb${S.fStat===s?" on":""}" onclick="setFS('${s}')">${s==="ALL"?"TOUS":s}</button>`).join("")}</div>
  </div>`;
  if(liveC>0)h+=`<div class="livebanner"><div class="ldot"><div class="ldc"></div><span class="ldt">LIVE</span></div><span class="lbt">${liveC} match(s) en direct</span></div>`;
  if(!fil.length)h+=`<div class="empty">Aucun match</div>`;
  else fil.forEach(m=>h+=cardHTML(m));
  document.getElementById("p-matchs").innerHTML=h;
}

function cardHTML(m){
  const a=m.analyse||{},c=m.cotes||{},pr=a.pronostic||"";
  const hiMap={"1":["1","1N","12"],"N":["N","1N","N2"],"2":["2","N2","12"]};
  const hi=hiMap[pr]||[];
  const sel=S.selIds.includes(m.id);
  const sc=m.statut==="EN COURS"?"#00ff88":m.statut==="TERMINE"?"#555":"#00d4ff";
  const cfC=cc(a.conf||0);

  return`<div class="mc${sel?" sel":""}" id="mc-${m.id}" onclick="togExp('${m.id}')">
    <div class="mc-top">
      <span class="mc-comp">${m.flag||"⚽"} ${m.competition||""} <span class="mc-time">${m.heure||""}</span></span>
      <div class="mc-badges">
        ${m.statut==="EN COURS"?`<div class="ldot"><div class="ldc"></div><span class="ldt">LIVE</span></div>`:""}
        ${bdg(m.statut||"A VENIR",sc)}
      </div>
    </div>
    <div class="teams">
      <div class="tn">${m.domicile||""}</div>
      <div class="sc-box">
        ${m.score?`<div class="sc-live">${m.score}</div>`:`<div class="sc-dash">–</div>`}
        <div class="sc-pred">🎯 ${a.score||"?-?"}</div>
      </div>
      <div class="tn r">${m.exterieur||""}</div>
    </div>
    <div class="odds">
      ${["1","N","2"].map((l,i)=>{
        const vs=[c.d,c.n,c.e],ps=[a.p1||0,a.pn||0,a.p2||0],ih=hi.includes(l);
        return`<div class="ob${ih?" hi":""}"><div class="ol${ih?" hi":""}">${l}</div><div class="ov${ih?" hi":""}">${vs[i]||"—"}</div><div class="op">${ps[i]}%</div></div>`;
      }).join("")}
    </div>
    <div class="cbar"><div style="flex:1">${bar(a.conf||0)}</div>${bdg("⚽ "+(pr||"?"),cfC)}${a.valeur?bdg("💎","#ffd700"):""}</div>
    <div id="exp-${m.id}" style="display:none">
      <div class="exp">
        ${a.resume?`<div class="resume">${a.resume}</div>`:""}
        ${a.facteur?`<div class="facteur"><span style="color:#ffd700">⚡ </span>${a.facteur}</div>`:""}
        <div class="forme-grid">
          ${[{n:m.domicile,f:a.fd},{n:m.exterieur,f:a.fe}].map(t=>`<div class="fc"><div class="fl">${t.n}</div><div class="fls">${(t.f||"?????").split("").map(r=>`<div class="fl-l" style="background:${r==="W"?"rgba(0,255,136,.2)":r==="D"?"rgba(255,215,0,.15)":"rgba(255,107,53,.15)"};color:${r==="W"?"#00ff88":r==="D"?"#ffd700":"#ff6b35"}">${r}</div>`).join("")}</div></div>`).join("")}
        </div>
        <div class="pl">${(a.paris||[]).map(p=>`<div class="pi-bet"><span class="pt">${p.t}: <span class="ps">${p.s}</span></span><span class="pc">@${p.c}</span></div>`).join("")}</div>
        <button class="addbtn ${sel?"rm":"add"}" onclick="event.stopPropagation();togSel('${m.id}')">
          ${sel?"✕ RETIRER":"+ AJOUTER AU COMBINÉ"}
        </button>
      </div>
    </div>
  </div>`;
}

function togExp(id){const el=document.getElementById("exp-"+id);if(el)el.style.display=el.style.display==="none"?"block":"none";}
function setFC(c){S.fComp=c;renderMatchs();}
function setFS(s){S.fStat=s;renderMatchs();}
function togSel(id){
  if(S.selIds.includes(id))S.selIds=S.selIds.filter(i=>i!==id);else S.selIds.push(id);
  S.custRes=null;
  document.getElementById("tab-custom").textContent=`🛠 MON COMBINÉ${S.selIds.length?` (${S.selIds.length})`:""}`; 
  renderMatchs();
  if(S.tab==="custom")renderCustom();
}

// ── COMBOS ──
function renderCombos(){
  const p=document.getElementById("p-combos");
  if(!S.combos){p.innerHTML=`<div style="text-align:center;padding:36px"><button class="gen-btn" onclick="fetchCombos()">Générer les combinés IA</button></div>`;return;}
  const d=S.combos;
  let h="";
  if(d.conseil)h+=`<div class="ibox conseil"><div class="ibox-t" style="color:#00d4ff">💡 CONSEIL DU JOUR</div><div class="ibox-c" style="color:rgba(255,255,255,.45)">${d.conseil}</div></div>`;
  if(d.bankroll)h+=`<div class="ibox bankroll"><div class="ibox-t" style="color:#ffd700">💰 BANKROLL</div><div class="ibox-c" style="color:rgba(255,255,255,.4)">${d.bankroll}</div></div>`;
  (d.combos||[]).forEach(cb=>{
    const col=tc(cb.type);
    h+=`<div class="cc" style="background:linear-gradient(135deg,${col}08,transparent);border:1px solid ${col}22">
      <div class="cc-top"><div>${bdg(cb.type,col)}<div class="cc-name">${cb.nom||""}</div><div class="cc-nb">${cb.nb||0} sél.</div></div>
      <div style="text-align:right"><div class="cc-cote" style="color:${col}">${cb.cote||"?"}x</div><div class="cc-mise">${cb.mise||""}</div><div class="cc-gain">10€→${cb.gain||"?"}</div></div></div>
      <div style="margin-bottom:8px">${bar(cb.conf||0)}</div>
      <div>${(cb.sels||[]).map(s=>`<div class="si" style="border-left:2px solid ${col}44"><div><div class="sm">${s.match||""} <span class="st">(${s.h||""})</span></div><div class="sr">${s.raison||""}</div></div><div class="ss"><div class="sp" style="color:${col}">${s.sel||""}</div><div class="sc2">@${s.cote||""}</div></div></div>`).join("")}</div>
      ${cb.desc?`<div class="cd2">${cb.desc}</div>`:""}
      ${cb.warn?`<div class="cw">⚠ ${cb.warn}</div>`:""}
    </div>`;
  });
  p.innerHTML=h;
}

// ── CUSTOM ──
function renderCustom(){
  const selM=S.matchs.filter(m=>S.selIds.includes(m.id));
  let h=`<div class="cinfo">Va dans <span>⚽ MATCHS</span> → ouvre un match → <span>+ AJOUTER AU COMBINÉ</span></div>`;
  if(!selM.length){h+=`<div class="empty">Aucun match sélectionné</div>`;document.getElementById("p-custom").innerHTML=h;return;}
  selM.forEach(m=>{h+=`<div class="srow"><div><span class="sn">${m.domicile} vs ${m.exterieur}</span><span class="stime">${m.heure}</span></div><div class="sright">${bdg(m.analyse?.pronostic||"?","#00d4ff")}<button class="rmbtn" onclick="togSel('${m.id}')">✕</button></div></div>`;});
  h+=`<button class="anabtn" onclick="buildCustom()" ${selM.length<2?"disabled":""}>${S.custRes?"↻ RECALCULER":"🔮 ANALYSER MON COMBINÉ ("+selM.length+" matchs)"}</button>`;
  if(S.custRes){
    const cr=S.custRes;const vc=cr.verdict==="JOUER"?"#00ff88":cr.verdict==="PRUDENCE"?"#ffd700":"#ff6b35";
    h+=`<div class="vbox"><div class="vhdr"><div><div class="vcote">${cr.cote||"?"}x</div><div class="vgain">10€ → ${cr.gain||"?"}</div></div><div style="text-align:right">${bdg(cr.verdict||"?",vc)}<div style="margin-top:7px;min-width:110px">${bar(cr.conf||0)}</div></div></div>
    <div class="vana">${cr.analyse||""}</div>
    <div class="vcons">💡 ${cr.conseil||""}</div>
    ${(cr.risques||[]).map(r=>`<div class="vrisk">⚠ ${r}</div>`).join("")}
    </div>`;
  }
  document.getElementById("p-custom").innerHTML=h;
}

// ── VALEURS ──
function renderValeurs(){
  const vm=S.matchs.filter(m=>m.analyse?.valeur);
  let h=`<div class="vinfo">💎 <strong>Valeur détectée</strong> = cote bookmaker sous-évaluée par Oracle.</div>`;
  if(!vm.length)h+=`<div class="empty">Aucune valeur détectée</div>`;
  else vm.forEach(m=>h+=cardHTML(m));
  document.getElementById("p-valeurs").innerHTML=h;
}
</script>
</body>
</html>
